name: Project Build

on:
  pull_request: { }
  push:
    branches:
      - 'main'

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx8g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  build:
    permissions:
      checks: write

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # add 'macos-26-intel'
        os: [
          ubuntu-latest,
          windows-latest,
          macos-latest
        ]

    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - uses: actions/checkout@v6
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew build --continue

      - uses: mikepenz/action-junit-report@v6
        with:
          report_paths: |
            **/build/test-results/**/TEST-*.xml
          check_name: 'Test Report - ${{ matrix.os }}'
          detailed_summary: true
          include_passed: true
          include_time_in_summary: true
          group_suite: true